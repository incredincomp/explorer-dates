name: Critical Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  critical-tests:
    name: Critical Runtime Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run critical regression tests
        run: |
          set -euo pipefail
          npm run lint
          if [ -f tests/verify-config.js ]; then npm run test:config; else echo "Skipping test:config (missing)"; fi
          if ls tests/test-configuration*.js >/dev/null 2>&1; then npm run test:config-scenarios; else echo "Skipping test:config-scenarios (missing)"; fi
