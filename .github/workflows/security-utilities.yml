name: Security Utilities

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  security-utils:
    name: Security Validation Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security utility tests
        run: |
          set -euo pipefail
          if ls tests/test-security*.js >/dev/null 2>&1; then for f in tests/test-security*.js; do echo "Running $f"; node "$f"; done; else echo "Skipping security utility tests (missing)"; fi
