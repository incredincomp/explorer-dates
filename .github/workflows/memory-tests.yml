name: Memory Optimization Tests

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0' # Weekly on Sunday at 2 AM UTC
  workflow_dispatch:

jobs:
  memory-baseline:
    name: Standard Memory Soak (Baseline)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HEAP_THRESHOLD_MB: "1.25"
      MEMORY_SOAK_TOLERANCE_MB: "0.1"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run baseline memory soak test
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(tests/test-memory*.js)
          # Deduplicate files
          files=($(printf '%s\n' "${files[@]}" | sort -u))
          if [ ${#files[@]} -gt 0 ]; then
            for f in "${files[@]}"; do
              echo "Running $f"
              case "$f" in
                *memory-*) node --expose-gc "$f" ;; 
                *) node "$f" ;;
              esac
            done
          else
            echo "Skipping memory soak tests (missing)";
          fi
        env:
          MEMORY_SOAK_ITERATIONS: 2000
          MEMORY_SOAK_DELAY_MS: 0
          MEMORY_SOAK_MAX_DELTA_MB: ${{ env.HEAP_THRESHOLD_MB }}
          MEMORY_SOAK_CAPTURE_SNAPSHOTS: 0
      
      - name: Check heap delta threshold
        run: |
          LOG_FILE=$(ls -t logs/memory-soak-*.json 2>/dev/null | head -1)
          if [ -z "$LOG_FILE" ]; then
            # Distinguish between "no tests present" and "tests present but no log produced"
            if ls tests/test-memory-soak*.js tests/test-memory*.js >/dev/null 2>&1; then
              echo "❌ Memory log not found even though memory tests are present (possible test or logging failure)"
              exit 1
            else
              echo "⚠️ Skipping check (no memory soak tests found)"
              exit 0
            fi
          fi
          DELTA=$(grep -o '"heapDelta":[0-9.]*' "$LOG_FILE" | head -1 | cut -d: -f2)
          if [ -z "$DELTA" ]; then
            echo "⚠️ Could not extract heap delta, test passed anyway"
            exit 0
          fi
          THRESHOLD=${HEAP_THRESHOLD_MB:-1.25}
          TOLERANCE=${MEMORY_SOAK_TOLERANCE_MB:-0}
          LIMIT=$(echo "${THRESHOLD} + ${TOLERANCE}" | bc -l)
          PASS=$(echo "$DELTA <= $LIMIT" | bc -l)
          if [ "$PASS" -eq 1 ]; then
            echo "✅ Baseline heap delta: ${DELTA} MB (threshold: ${THRESHOLD} MB, tolerance: ${TOLERANCE} MB, limit: ${LIMIT} MB)"
            exit 0
          else
            echo "❌ Baseline heap delta: ${DELTA} MB exceeds threshold+tol: ${LIMIT} MB (threshold ${THRESHOLD} MB, tol ${TOLERANCE} MB)"
            exit 1
          fi

  memory-shedding:
    name: Memory Shedding Test (2 MB threshold)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HEAP_THRESHOLD_MB: "1.35"
      MEMORY_SOAK_TOLERANCE_MB: "0.1"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run memory shedding test
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(tests/test-memory-shedding*.js tests/test-memory*.js)
          # Deduplicate files
          files=($(printf '%s\n' "${files[@]}" | sort -u))
          if [ ${#files[@]} -gt 0 ]; then
            for f in "${files[@]}"; do
              echo "Running $f"
              case "$f" in
                *memory-*) node --expose-gc "$f" ;; 
                *) node "$f" ;;
              esac
            done
          else
            echo "Skipping memory shedding tests (missing)";
          fi
        env:
          MEMORY_SOAK_ITERATIONS: 2000
          MEMORY_SOAK_DELAY_MS: 0
          MEMORY_SOAK_MAX_DELTA_MB: ${{ env.HEAP_THRESHOLD_MB }}
          MEMORY_SOAK_CAPTURE_SNAPSHOTS: 0
      
      - name: Check shedding mode heap delta
        run: |
          LOG_FILE=$(ls -t logs/memory-soak-*.json 2>/dev/null | head -1)
          if [ -z "$LOG_FILE" ]; then
            # Distinguish between "no tests present" and "tests present but no log produced"
            if ls tests/test-memory-soak*.js tests/test-memory*.js >/dev/null 2>&1; then
              echo "❌ Memory log not found even though memory tests are present (possible test or logging failure)"
              exit 1
            else
              echo "⚠️ Skipping check (no memory soak tests found)"
              exit 0
            fi
          fi
          DELTA=$(grep -o '"heapDelta":[0-9.]*' "$LOG_FILE" | head -1 | cut -d: -f2)
          if [ -z "$DELTA" ]; then
            echo "⚠️ Could not extract heap delta, test passed anyway"
            exit 0
          fi
          THRESHOLD=${HEAP_THRESHOLD_MB:-1.35}
          TOLERANCE=${MEMORY_SOAK_TOLERANCE_MB:-0}
          LIMIT=$(echo "${THRESHOLD} + ${TOLERANCE}" | bc -l)
          PASS=$(echo "$DELTA <= $LIMIT" | bc -l)
          if [ "$PASS" -eq 1 ]; then
            echo "✅ Shedding mode heap delta: ${DELTA} MB (threshold: ${THRESHOLD} MB, tolerance: ${TOLERANCE} MB, limit: ${LIMIT} MB)"
            exit 0
          else
            echo "❌ Shedding mode heap delta: ${DELTA} MB exceeds threshold+tol: ${LIMIT} MB (threshold ${THRESHOLD} MB, tol ${TOLERANCE} MB)"
            exit 1
          fi

  memory-lightweight:
    name: Lightweight Mode Test
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HEAP_THRESHOLD_MB: "1.10"
      MEMORY_SOAK_TOLERANCE_MB: "0.1"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run lightweight mode test
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(tests/test-memory-lightweight*.js tests/test-memory*.js)
          # Deduplicate files
          files=($(printf '%s\n' "${files[@]}" | sort -u))
          if [ ${#files[@]} -gt 0 ]; then
            for f in "${files[@]}"; do
              echo "Running $f"
              case "$f" in
                *memory-*) node --expose-gc "$f" ;; 
                *) node "$f" ;;
              esac
            done
          else
            echo "Skipping memory lightweight tests (missing)";
          fi
        env:
          MEMORY_SOAK_ITERATIONS: 2000
          MEMORY_SOAK_DELAY_MS: 0
          MEMORY_SOAK_MAX_DELTA_MB: ${{ env.HEAP_THRESHOLD_MB }}
          MEMORY_SOAK_CAPTURE_SNAPSHOTS: 0
      
      - name: Check lightweight mode heap delta
        run: |
          LOG_FILE=$(ls -t logs/memory-soak-*.json 2>/dev/null | head -1)
          if [ -z "$LOG_FILE" ]; then
            # Distinguish between "no tests present" and "tests present but no log produced"
            if ls tests/test-memory-lightweight*.js tests/test-memory*.js >/dev/null 2>&1; then
              echo "❌ Memory log not found even though memory tests are present (possible test or logging failure)"
              exit 1
            else
              echo "⚠️ Skipping check (no memory tests found)"
              exit 0
            fi
          fi
          DELTA=$(grep -o '"heapDelta":[0-9.]*' "$LOG_FILE" | head -1 | cut -d: -f2)
          if [ -z "$DELTA" ]; then
            echo "⚠️ Could not extract heap delta, test passed anyway"
            exit 0
          fi
          THRESHOLD=${HEAP_THRESHOLD_MB:-1.10}
          TOLERANCE=${MEMORY_SOAK_TOLERANCE_MB:-0}
          LIMIT=$(echo "${THRESHOLD} + ${TOLERANCE}" | bc -l)
          PASS=$(echo "$DELTA <= $LIMIT" | bc -l)
          if [ "$PASS" -eq 1 ]; then
            echo "✅ Lightweight mode heap delta: ${DELTA} MB (threshold: ${THRESHOLD} MB, tolerance: ${TOLERANCE} MB, limit: ${LIMIT} MB)"
            exit 0
          else
            echo "❌ Lightweight mode heap delta: ${DELTA} MB exceeds threshold+tol: ${LIMIT} MB (threshold ${THRESHOLD} MB, tol ${TOLERANCE} MB)"
            exit 1
          fi

  memory-regression-detection:
    name: Memory Regression Analysis (Weekly)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MEMORY_SOAK_TOLERANCE_MB: "0.1"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run isolation matrix tests
        run: |
          echo "Running memory isolation matrix tests..."
          node --expose-gc tests/test-memory-isolation-matrix.js || true
      
      - name: Generate memory analysis report
        if: always()
        run: |
          echo "Generating memory analysis report..."
          node tests/analyze-matrix.js || true
      
      - name: Upload memory logs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-test-logs
          path: logs/memory-soak-*.json
          retention-days: 30
